<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TumanaGO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="64x64" href="TumanaGO_logo2.png">
</head>
<body>
    <header>
        <div class="welcome_page">
            <img src="TumanaGO_logo.png" alt="The Logo of website" width="180px">
            <h1>Welcome To<br>TumanaGO</h1>
            <p>Ang mabilis mong gabay sa ating Barangay</p>
            <a href="homepage.html">
                <input type="button" value="START" id="btnstart">
            </a>
        </div>
    </header>
    <main>
        <div class="quick_action">
            <h3>Quick Actions</h3>
            <div class="quickAction_btn">
                <div class="btnEmergency">
                    <a href="emergency.html">
                        <button class="emergency_btn">
                            <i class="fa-solid fa-phone-volume"></i><span>Emergency</span>
                        </button>
                    </a>
                </div>
                <div class="btnMarikinaPio">
                    <a href="https://www.facebook.com/MarikinaPIO">
                        <button class="marikinapio_btn">
                            <i class="fa-brands fa-square-facebook"></i><span>Marikina PIO</span> 
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="disclaimer">
            <h5><strong>PAALALA:</strong> Hindi ito official website ng gobyerno/pamahalaan. Ito ay binuo ng boluntaryong kabataang Tumanian para sa komunidad.</h5>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
